<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bad Ending — Lost</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body id="bad">
  <div class="overlay start" id="resumeOverlay">
    <h1>Something is here</h1>
    <p class="sub">Click to confront it</p>
    <button id="resumeBtn">Play</button>
  </div>

  <main class="scene end" id="endScene">
    <img id="jumpScare" src="assets/images/jumpScare.png" alt="jump scare" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; cursor:pointer; z-index:1000;">
    <div class="content">
      <h2>Bad Ending</h2>
      <p>The forest swallowed the path, whispers rose, and something moved behind you. There was no coming back.</p>

     
      <p><a href="start.html">Try again</a></p>
    </div>
  </main>

  <audio id="BadEndAudio" src="assets/sounds/badend_sound.mp3"></audio>

  <script src="script.js"></script>

</html>
